<nav id="site-nav" class="site-nav" role="navigation" aria-label="Menu principal">
  <div class="container" style="display:flex;align-items:center;gap:1rem;justify-content:space-between">
    <a class="brand" href="/" aria-label="Novo Despertar — Início">Novo Despertar</a>

    <button id="nav-toggle" class="btn btn-outline" aria-expanded="false" aria-controls="nav-links" aria-label="Abrir menu">
      Menu
    </button>

    <ul id="nav-links" class="nav-links" role="menubar" aria-hidden="true" style="margin:0;padding:0;display:flex;gap:1rem;list-style:none">
      <li role="none"><a role="menuitem" href="/" class="nav-link">Início</a></li>
      <li role="none"><a role="menuitem" href="/temas.html" class="nav-link">Temas</a></li>
      <li role="none"><a role="menuitem" href="/artigos.html" class="nav-link">Artigos</a></li>
      <li role="none"><a role="menuitem" href="/sobre.html" class="nav-link">Sobre</a></li>
      <li role="none"><a role="menuitem" href="/admin.html" class="nav-link">Admin</a></li>
    </ul>
  </div>
</nav>

<script>
  (function(){
    const toggle = document.getElementById('nav-toggle');
    const links = document.getElementById('nav-links');
    if (!toggle || !links) return;

    function openMenu() {
      links.style.display = 'flex';
      links.setAttribute('aria-hidden', 'false');
      toggle.setAttribute('aria-expanded', 'true');
      document.body.classList.add('site-nav-open');
    }
    function closeMenu() {
      links.style.display = '';
      links.setAttribute('aria-hidden', 'true');
      toggle.setAttribute('aria-expanded', 'false');
      document.body.classList.remove('site-nav-open');
    }

    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      if (expanded) closeMenu(); else openMenu();
    });

    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && toggle.getAttribute('aria-expanded') === 'true') closeMenu();
    });

    links.addEventListener('click', (ev) => {
      if (ev.target && ev.target.matches('a')) closeMenu();
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 720) {
        links.style.display = '';
        links.setAttribute('aria-hidden', 'false');
        toggle.setAttribute('aria-expanded', 'false');
      } else {
        links.setAttribute('aria-hidden', 'true');
      }
    });
  })();
</script>
