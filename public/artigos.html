<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artigos — Novo Despertar</title>
  <meta name="description" content="Lista de artigos do Novo Despertar — explora temas, filtra e lê artigos completos." />
  <link rel="stylesheet" href="/css/theme.css?v=1" />
  <link rel="icon" href="/favicon.ico" />
  <style>
    /* Pequenos estilos locais para layout da listagem */
    .articles-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; }
    .article-card { background:#fff;border-radius:8px;padding:1rem;box-shadow:var(--card-shadow);display:flex;flex-direction:column;gap:0.5rem;min-height:160px; }
    .article-card img { width:100%;height:160px;object-fit:cover;border-radius:6px;display:block }
    .article-meta { color:#64748b;font-size:0.9rem }
    .controls { display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem }
    .controls input[type="search"]{padding:0.5rem;border-radius:6px;border:1px solid rgba(15,23,36,0.06);min-width:220px}
    .pagination { display:flex;gap:0.5rem;align-items:center;justify-content:center;margin-top:1rem }
    .placeholder-img { background:linear-gradient(90deg,#f1f5f9,#e2e8f0);height:160px;border-radius:6px }
  </style>
</head>
<body>
  <div id="site-menu"></div>
  <script src="/js/menu-loader.js" defer></script>
  <script src="/js/toasts.js" defer></script>

  <main class="container" id="main" role="main">
    <header class="page-header" style="margin-bottom:1rem">
      <h1>Artigos</h1>
      <p class="lead">Explora artigos por tema, pesquisa por palavras-chave e navega entre páginas.</p>
    </header>

    <section aria-labelledby="controls-heading" style="margin-bottom:1rem">
      <h2 id="controls-heading" class="visually-hidden">Controles de pesquisa e filtro</h2>
      <div class="controls" role="region" aria-label="Pesquisa e filtros">
        <form id="search-form" style="display:flex;gap:0.5rem;align-items:center" role="search">
          <label for="q" class="visually-hidden">Pesquisar artigos</label>
          <input id="q" name="q" type="search" placeholder="Pesquisar artigos..." aria-label="Pesquisar artigos" />
          <button id="search-btn" class="btn" type="submit">Pesquisar</button>
          <button id="clear-btn" class="btn btn-outline" type="button">Limpar</button>
        </form>

        <label for="theme-select" class="visually-hidden">Filtrar por tema</label>
        <select id="theme-select" aria-label="Filtrar por tema" style="padding:0.5rem;border-radius:6px;border:1px solid rgba(15,23,36,0.06)">
          <option value="">Todos os temas</option>
          <option value="espiritualidade">Espiritualidade</option>
          <option value="saude-mental">Saúde Mental</option>
          <option value="praticas">Práticas</option>
          <option value="historia">História</option>
        </select>

        <div style="margin-left:auto;color:#475569;font-size:0.95rem" id="results-count" aria-live="polite"></div>
      </div>
    </section>

    <section id="articles-section" aria-labelledby="articles-heading">
      <h2 id="articles-heading" class="visually-hidden">Lista de artigos</h2>
      <div id="articles-grid" class="articles-grid" aria-live="polite"></div>

      <div class="pagination" id="pagination" aria-label="Navegação entre páginas" style="display:none">
        <button id="prev-page" class="btn btn-outline" type="button">Anterior</button>
        <span id="page-info" style="min-width:120px;text-align:center"></span>
        <button id="next-page" class="btn" type="button">Seguinte</button>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    (function () {
      // Helpers
      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => Array.from(document.querySelectorAll(sel));
      const show = (el) => el && (el.style.display = '');
      const hide = (el) => el && (el.style.display = 'none');
      const placeholderImage = '/images/placeholder-article.jpg';

      // Elements
      const articlesGrid = document.getElementById('articles-grid');
      const resultsCount = document.getElementById('results-count');
      const searchForm = document.getElementById('search-form');
      const qInput = document.getElementById('q');
      const themeSelect = document.getElementById('theme-select');
      const clearBtn = document.getElementById('clear-btn');
      const pagination = document.getElementById('pagination');
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');

      // State
      let page = 1;
      const pageSize = 12;
      let total = 0;
      let lastQuery = '';

      // Toast helper fallback
      const t = {
        success: (m) => window.toastSuccess ? toastSuccess(m) : console.info(m),
        error: (m) => window.toastError ? toastError(m) : console.error(m),
        info: (m) => window.toastInfo ? toastInfo(m) : console.info(m),
        warn: (m) => window.toastWarn ? toastWarn(m) : console.warn(m)
      };

      // Render helpers
      function formatDate(iso) {
        try { return new Date(iso).toLocaleDateString('pt-PT', { day:'2-digit', month:'short', year:'numeric' }); }
        catch (e) { return iso; }
      }

      function createCard(a) {
        const div = document.createElement('article');
        div.className = 'article-card';
        const imgSrc = a.image || placeholderImage;
        div.innerHTML = `
          <a href="${escapeHtml(a.url || '/artigo.html?id=' + encodeURIComponent(a.id))}" style="text-decoration:none;color:inherit">
            <div style="margin-bottom:0.5rem">
              <img loading="lazy" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(a.title)}" onerror="this.onerror=null;this.src='${placeholderImage}'" />
            </div>
            <h3 style="margin:0 0 0.25rem">${escapeHtml(a.title)}</h3>
            <div class="article-meta">${formatDate(a.published_at || a.date)} • ${escapeHtml(a.theme || 'Geral')}</div>
            <p style="margin-top:0.5rem;color:#334155">${escapeHtml(a.excerpt || (a.body || '').slice(0,120) + '...')}</p>
          </a>
        `;
        return div;
      }

      function escapeHtml(s){ return String(s || '').replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]); }

      // Fetch articles with query params
      async function loadArticles(opts = {}) {
        const q = opts.q ?? qInput.value.trim();
        const theme = opts.theme ?? themeSelect.value;
        const p = opts.page ?? page;
        const size = pageSize;

        const params = new URLSearchParams();
        if (q) params.set('q', q);
        if (theme) params.set('theme', theme);
        params.set('page', String(p));
        params.set('pageSize', String(size));

        articlesGrid.innerHTML = '<div style="grid-column:1/-1;padding:1rem">A carregar artigos…</div>';
        try {
          const res = await fetch('/api/articles?' + params.toString(), { cache: 'no-cache' });
          if (!res.ok) {
            t.error('Não foi possível carregar artigos.');
            articlesGrid.innerHTML = '<div style="grid-column:1/-1;padding:1rem">Erro ao carregar artigos.</div>';
            return;
          }
          const data = await res.json();
          // Expecting { items: [...], total: number }
          const items = Array.isArray(data.items) ? data.items : (Array.isArray(data) ? data : []);
          total = typeof data.total === 'number' ? data.total : items.length;
          page = p;
          renderArticles(items);
          updatePagination();
          resultsCount.textContent = `${total} artigo${total===1?'':'s'}`;
          lastQuery = q;
        } catch (err) {
          console.error(err);
          t.error('Erro de rede ao carregar artigos.');
          articlesGrid.innerHTML = '<div style="grid-column:1/-1;padding:1rem">Erro de rede ao carregar artigos.</div>';
        }
      }

      function renderArticles(items) {
        articlesGrid.innerHTML = '';
        if (!items || items.length === 0) {
          articlesGrid.innerHTML = '<div style="grid-column:1/-1;padding:1rem">Nenhum artigo encontrado.</div>';
          hide(pagination);
          resultsCount.textContent = '0 artigos';
          return;
        }
        items.forEach(a => articlesGrid.appendChild(createCard(a)));
        show(pagination);
      }

      function updatePagination() {
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        pageInfo.textContent = `Página ${page} de ${totalPages}`;
        prevBtn.disabled = page <= 1;
        nextBtn.disabled = page >= totalPages;
        if (totalPages <= 1) hide(pagination); else show(pagination);
      }

      // Event handlers
      searchForm.addEventListener('submit', (ev) => {
        ev.preventDefault();
        page = 1;
        loadArticles({ q: qInput.value.trim(), theme: themeSelect.value, page });
      });

      clearBtn.addEventListener('click', () => {
        qInput.value = '';
        themeSelect.value = '';
        page = 1;
        loadArticles({ q: '', theme: '', page });
      });

      themeSelect.addEventListener('change', () => {
        page = 1;
        loadArticles({ q: qInput.value.trim(), theme: themeSelect.value, page });
      });

      prevBtn.addEventListener('click', () => {
        if (page > 1) { page -= 1; loadArticles({ page }); }
      });
      nextBtn.addEventListener('click', () => {
        page += 1; loadArticles({ page });
      });

      // Initial load after DOM ready and menu loaded
      function init() {
        // If menu-loader injects menu later, wait for it; otherwise proceed
        if (!document.getElementById('site-menu') || document.getElementById('site-menu').querySelector('nav')) {
          loadArticles({ page: 1 });
        } else {
          document.addEventListener('menu:loaded', () => loadArticles({ page: 1 }));
        }
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else setTimeout(init, 0);

      // Footer loader (robust)
      (async function loadFooter(){
        const el = document.getElementById('site-footer');
        if (!el) return;
        try {
          const r = await fetch('/partials/footer.html', { cache: 'no-cache' });
          if (r.ok) el.innerHTML = await r.text();
          else el.innerHTML = '<footer class="site-footer"><div class="container"><p>© Novo Despertar — 2026</p></div></footer>';
        } catch (e) {
          el.innerHTML = '<footer class="site-footer"><div class="container"><p>© Novo Despertar — 2026</p></div></footer>';
        }
      })();
    })();
  </script>
</body>
</html>
