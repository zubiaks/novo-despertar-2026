<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artigos — Novo Despertar</title>
  <meta name="description" content="Lista de artigos, pesquisa e filtros do Novo Despertar." />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <!-- Menu centralizado (partial carregado por /js/menu-loader.js) -->
  <div id="site-menu"></div>
  <script src="/js/menu-loader.js" defer></script>

  <main class="container" id="main" role="main">
    <header class="page-header">
      <h1>Artigos</h1>
      <p class="lead">Últimos textos, reflexões e recursos. Pesquisa por título, filtra por tema ou ordena por data.</p>
    </header>

    <section class="controls" aria-label="Controles de pesquisa e filtro">
      <form id="search-form" class="search-form" role="search" aria-label="Pesquisar artigos">
        <label for="q" class="visually-hidden">Pesquisar</label>
        <input id="q" name="q" type="search" placeholder="Pesquisar artigos..." autocomplete="off" />
        <button type="submit">Pesquisar</button>
      </form>

      <div class="filters" aria-hidden="false">
        <label for="filter-theme" class="visually-hidden">Filtrar por tema</label>
        <select id="filter-theme" name="tema">
          <option value="">Todos os temas</option>
          <option value="espiritualidade">Espiritualidade</option>
          <option value="saude-mental">Saúde Mental</option>
          <option value="praticas">Práticas</option>
          <option value="historia">História</option>
        </select>

        <label for="sort-by" class="visually-hidden">Ordenar por</label>
        <select id="sort-by" name="sort">
          <option value="date_desc">Mais recentes</option>
          <option value="date_asc">Mais antigos</option>
          <option value="title_asc">Título A–Z</option>
        </select>
      </div>
    </section>

    <section id="articles-section" aria-labelledby="articles-heading">
      <h2 id="articles-heading" class="visually-hidden">Lista de artigos</h2>

      <div id="articles-list" class="articles-grid" role="list">
        <!-- Artigos carregados dinamicamente -->
      </div>

      <nav id="pagination" class="pagination" aria-label="Paginação de artigos" hidden>
        <button id="prev-page" aria-label="Página anterior">Anterior</button>
        <span id="page-info" aria-live="polite"></span>
        <button id="next-page" aria-label="Próxima página">Próxima</button>
      </nav>
    </section>
  </main>

  <!-- Footer partial -->
  <div id="site-footer"></div>
  <script>
    (async ()=>{
      const el = document.getElementById('site-footer');
      if (!el) return;
      try {
        const r = await fetch('/partials/footer.html', { cache: 'no-cache' });
        if (r.ok) el.innerHTML = await r.text();
        else el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      } catch (e) {
        el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      }
    })();
  </script>

  <!-- Script: carregar artigos via API e gerir pesquisa/filtragem -->
  <script>
    (function(){
      const listEl = document.getElementById('articles-list');
      const form = document.getElementById('search-form');
      const qInput = document.getElementById('q');
      const themeSelect = document.getElementById('filter-theme');
      const sortSelect = document.getElementById('sort-by');
      const pagination = document.getElementById('pagination');
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');

      let page = 1;
      const perPage = 10;

      function renderArticleCard(a) {
        const card = document.createElement('article');
        card.className = 'article-card';
        card.setAttribute('role', 'listitem');

        const link = document.createElement('a');
        link.className = 'article-link';
        link.href = `/artigo-exemplo.html?slug=${encodeURIComponent(a.slug || a.id)}`;

        const thumb = document.createElement('div');
        thumb.className = 'article-thumb';
        thumb.setAttribute('aria-hidden', 'true');
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.width = 480;
        img.height = 320;
        img.alt = a.imageAlt || '';
        img.src = a.imageThumbUrl || a.imageUrl || '/assets/articles/default-thumb.jpg';
        thumb.appendChild(img);

        const body = document.createElement('div');
        body.className = 'article-body';
        const h3 = document.createElement('h3');
        h3.className = 'article-title';
        h3.textContent = a.title || 'Sem título';
        const p = document.createElement('p');
        p.className = 'article-excerpt';
        p.textContent = a.excerpt || '';
        const time = document.createElement('time');
        time.className = 'article-date';
        if (a.date) {
          time.dateTime = a.date;
          time.textContent = new Date(a.date).toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        body.appendChild(h3);
        body.appendChild(p);
        body.appendChild(time);

        link.appendChild(thumb);
        link.appendChild(body);
        card.appendChild(link);
        return card;
      }

      async function fetchArticles({ q='', tema='', sort='date_desc', page=1, perPage=10 } = {}) {
        // API contract: GET /api/articles?q=&tema=&sort=&page=&perPage=
        const params = new URLSearchParams();
        if (q) params.set('q', q);
        if (tema) params.set('tema', tema);
        if (sort) params.set('sort', sort);
        params.set('page', String(page));
        params.set('perPage', String(perPage));
        const url = '/api/articles?' + params.toString();
        try {
          const res = await fetch(url, { cache: 'no-cache' });
          if (!res.ok) {
            const txt = await res.text();
            listEl.innerHTML = `<p class="error">Erro ao carregar artigos: ${txt}</p>`;
            pagination.hidden = true;
            return { items: [], total: 0 };
          }
          const json = await res.json();
          // Expecting { items: [...], total: number }
          return json;
        } catch (err) {
          listEl.innerHTML = '<p class="error">Erro de rede ao carregar artigos.</p>';
          pagination.hidden = true;
          return { items: [], total: 0 };
        }
      }

      async function loadAndRender() {
        listEl.innerHTML = '<p class="loading">A carregar artigos…</p>';
        const q = qInput.value.trim();
        const tema = themeSelect.value;
        const sort = sortSelect.value;
        const data = await fetchArticles({ q, tema, sort, page, perPage });
        listEl.innerHTML = '';
        if (!data.items || data.items.length === 0) {
          listEl.innerHTML = '<p class="empty">Nenhum artigo encontrado.</p>';
          pagination.hidden = true;
          return;
        }
        data.items.forEach(a => listEl.appendChild(renderArticleCard(a)));
        // pagination
        const total = Number(data.total || data.items.length);
        const totalPages = Math.max(1, Math.ceil(total / perPage));
        pageInfo.textContent = `Página ${page} de ${totalPages}`;
        prevBtn.disabled = page <= 1;
        nextBtn.disabled = page >= totalPages;
        pagination.hidden = false;
      }

      form.addEventListener('submit', (ev) => {
        ev.preventDefault();
        page = 1;
        loadAndRender();
      });

      themeSelect.addEventListener('change', () => { page = 1; loadAndRender(); });
      sortSelect.addEventListener('change', () => { page = 1; loadAndRender(); });

      prevBtn.addEventListener('click', () => { if (page > 1) { page--; loadAndRender(); } });
      nextBtn.addEventListener('click', () => { page++; loadAndRender(); });

      // initial load
      loadAndRender();
    })();
  </script>
</body>
</html>
