<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Novo Despertar</title>
  <meta name="description" content="Painel de administração — criar e editar artigos." />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <!-- Menu centralizado -->
  <div id="site-menu"></div>
  <script src="/js/menu-loader.js" defer></script>

  <main class="container" id="main" role="main">
    <header class="page-header">
      <h1>Admin</h1>
      <p class="lead">Criar novo artigo ou editar existentes.</p>
    </header>

    <section class="admin-actions">
      <button id="btn-new" class="btn">Novo artigo</button>
    </section>

    <!-- Modal / Formulário de criação -->
    <div id="modal" class="modal" hidden>
      <div class="modal-inner" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header>
          <h2 id="modal-title">Novo artigo</h2>
          <button id="modal-close" class="btn-link" aria-label="Fechar">✕</button>
        </header>

        <form id="article-form">
          <label for="title">Título</label>
          <input id="title" name="title" type="text" required />

          <label for="date">Data</label>
          <input id="date" name="date" type="date" required />

          <label for="excerpt">Resumo</label>
          <textarea id="excerpt" name="excerpt" rows="3"></textarea>

          <label for="content">Conteúdo (HTML)</label>
          <textarea id="content" name="content" rows="10" required></textarea>

          <label for="imageInput">Imagem principal</label>
          <input id="imageInput" name="image" type="file" accept="image/*" />

          <div class="modal-actions">
            <button id="save-article" type="submit" class="btn">Guardar</button>
            <button id="cancel-article" type="button" class="btn btn-outline">Cancelar</button>
          </div>

          <div id="modal-msg" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>

    <!-- Lista simples de artigos (pode ser preenchida dinamicamente) -->
    <section id="admin-list" class="admin-list">
      <h2>Artigos</h2>
      <div id="articles-admin"></div>
    </section>
  </main>

  <!-- Footer partial -->
  <div id="site-footer"></div>
  <script>
    (async ()=>{
      const el = document.getElementById('site-footer');
      if (!el) return;
      try {
        const r = await fetch('/partials/footer.html', { cache: 'no-cache' });
        if (r.ok) el.innerHTML = await r.text();
        else el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      } catch (e) {
        el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      }
    })();
  </script>

  <!-- Script do admin: modal, upload e criação de artigo -->
  <script>
    (function(){
      // Elementos
      const btnNew = document.getElementById('btn-new');
      const modal = document.getElementById('modal');
      const modalClose = document.getElementById('modal-close');
      const cancelBtn = document.getElementById('cancel-article');
      const form = document.getElementById('article-form');
      const msgEl = document.getElementById('modal-msg');
      const imageInput = document.getElementById('imageInput');

      // Helpers
      function showModal() { modal.hidden = false; modal.querySelector('input,textarea')?.focus(); }
      function hideModal() { modal.hidden = true; form.reset(); msgEl.textContent = ''; }
      function showMsg(text, isError=false) { msgEl.textContent = text; msgEl.style.color = isError ? 'crimson' : ''; }

      // Auth helper
      function getToken() { try { return sessionStorage.getItem('nd_token'); } catch { return null; } }

      // Open modal handlers
      btnNew.addEventListener('click', () => {
        // preserve previous behavior: set flag if needed
        try { sessionStorage.setItem('nd_open_new', '1'); } catch {}
        showModal();
      });
      modalClose.addEventListener('click', hideModal);
      cancelBtn.addEventListener('click', hideModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

      // Form submit: upload image (if any) then create article
      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        showMsg('A processar…');

        const token = getToken();
        if (!token) { showMsg('Não autenticado. Faz login antes.', true); return; }

        const title = document.getElementById('title').value.trim();
        const date = document.getElementById('date').value;
        const excerpt = document.getElementById('excerpt').value.trim();
        const content = document.getElementById('content').value.trim();

        if (!title || !date || !content) { showMsg('Preenche título, data e conteúdo.', true); return; }

        try {
          let imageUrl = '';
          let imageThumbUrl = '';

          // Se houver ficheiro, faz upload primeiro
          const file = imageInput.files?.[0];
          if (file) {
            const fd = new FormData();
            fd.append('image', file); // backend espera 'image'
            const upRes = await fetch('/api/upload', {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token },
              body: fd
            });
            if (!upRes.ok) {
              const txt = await upRes.text();
              showMsg('Upload falhou: ' + txt, true);
              return;
            }
            const upJson = await upRes.json();
            imageUrl = upJson.url || '';
            imageThumbUrl = upJson.thumbUrl || upJson.thumb || '';
          }

          // Criar artigo
          const payload = { title, date, excerpt, content, imageUrl, imageThumbUrl };
          const createRes = await fetch('/api/articles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify(payload)
          });
          if (!createRes.ok) {
            const txt = await createRes.text();
            showMsg('Criação falhou: ' + txt, true);
            return;
          }
          const created = await createRes.json();
          showMsg('Artigo criado com sucesso.');
          // opcional: atualizar lista de artigos
          setTimeout(() => { hideModal(); loadAdminArticles(); }, 800);
        } catch (err) {
          showMsg('Erro inesperado: ' + (err.message || err), true);
        }
      });

      // Função para listar artigos no admin (simples)
      async function loadAdminArticles() {
        const container = document.getElementById('articles-admin');
        if (!container) return;
        container.innerHTML = '<p class="loading">A carregar artigos…</p>';
        try {
          const res = await fetch('/api/articles?page=1&perPage=50', { cache: 'no-cache' });
          if (!res.ok) { container.innerHTML = '<p class="error">Erro ao carregar artigos.</p>'; return; }
          const json = await res.json();
          const items = json.items || (Array.isArray(json) ? json : []);
          if (!items.length) { container.innerHTML = '<p class="empty">Sem artigos.</p>'; return; }
          container.innerHTML = '';
          items.forEach(a => {
            const el = document.createElement('div');
            el.className = 'admin-article';
            el.innerHTML = `<strong>${a.title}</strong> <small>${a.date || ''}</small>
              <div class="admin-actions">
                <button class="btn-edit" data-id="${a.id}">Editar</button>
                <button class="btn-delete" data-id="${a.id}">Eliminar</button>
              </div>`;
            container.appendChild(el);
          });
          // attach delete/edit handlers (delegation could be used)
          container.querySelectorAll('.btn-delete').forEach(b => b.addEventListener('click', onDelete));
          container.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', onEdit));
        } catch (e) {
          container.innerHTML = '<p class="error">Erro de rede.</p>';
        }
      }

      async function onDelete(ev) {
        const id = ev.currentTarget.dataset.id;
        if (!confirm('Eliminar este artigo?')) return;
        const token = getToken();
        if (!token) return alert('Não autenticado.');
        try {
          const res = await fetch('/api/articles/' + encodeURIComponent(id), {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token }
          });
          if (!res.ok) return alert('Erro ao eliminar.');
          loadAdminArticles();
        } catch (e) { alert('Erro de rede.'); }
      }

      async function onEdit(ev) {
        const id = ev.currentTarget.dataset.id;
        // comportamento simples: abrir modal e preencher campos com dados do artigo
        try {
          const res = await fetch('/api/articles/' + encodeURIComponent(id), { cache: 'no-cache' });
          if (!res.ok) return alert('Erro ao carregar artigo.');
          const a = await res.json();
          document.getElementById('title').value = a.title || '';
          document.getElementById('date').value = a.date ? a.date.split('T')[0] : '';
          document.getElementById('excerpt').value = a.excerpt || '';
          document.getElementById('content').value = a.content || a.body || '';
          showModal();
          // para edição real, o submit handler teria de usar PUT/PATCH em vez de POST
        } catch (e) { alert('Erro de rede.'); }
      }

      // Inicialização
      loadAdminArticles();

      // Auto-open modal se flag definida (compat com menu-loader)
      try {
        if (sessionStorage.getItem('nd_open_new')) {
          sessionStorage.removeItem('nd_open_new');
          showModal();
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
