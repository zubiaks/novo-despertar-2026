<!--
  public/artigo-exemplo.html
  Melhorias aplicadas:
  - Barra de navegação consistente (Início, Artigos, Temas, Sobre, Admin) com destaque automático do item ativo.
  - Link "Criar artigo" visível apenas quando autenticado; ao clicar define uma flag e navega para /admin.html para abrir o modal automaticamente.
  - Imagem principal com placeholder blur-up, srcset/sizes, loading="lazy", decoding="async" e remoção do blur quando a imagem real carrega.
  - Tratamento robusto de fetch, mensagens de erro e foco no conteúdo para acessibilidade.
  - Scripts defensivos (try/catch) para evitar falhas em ambientes com storage desativado.
-->
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artigo — Novo Despertar</title>
  <meta name="description" content="Artigo do Novo Despertar" />
  <style>
    :root{
      --bg:#0e0e0f; --panel:#111; --muted:#e6e6e6; --accent:#c9a86a;
      --maxw:900px; --radius:8px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Georgia,serif;background:var(--bg);color:var(--muted);-webkit-font-smoothing:antialiased}
    header.site{position:sticky;top:0;background:var(--panel);border-bottom:1px solid #222;z-index:40}
    .nav{max-width:var(--maxw);margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
    .brand{font-weight:700;color:var(--accent);text-decoration:none}
    .nav a{color:var(--muted);text-decoration:none;padding:6px 8px;border-radius:6px}
    .nav a.active{background:#0b0b0b}
    .wrap{max-width:var(--maxw);margin:36px auto;padding:0 20px}
    a{color:var(--accent);text-decoration:none}
    h1{margin:18px 0 6px;font-size:28px}
    .meta{color:rgba(230,230,230,0.7);margin-bottom:18px}
    .lead{font-size:16px;opacity:0.95;margin-bottom:18px}
    .feature-wrap{margin-bottom:18px}
    img.feature{max-width:100%;border-radius:var(--radius);display:block;filter:blur(8px);transform:scale(1.02);transition:filter .35s ease, transform .35s ease}
    img.feature.loaded{filter:blur(0);transform:scale(1)}
    .small{font-size:13px;color:rgba(230,230,230,0.75)}
    .center{text-align:center}
    .error{color:#ff6b6b}
    footer{border-top:1px solid #222;padding:26px 20px;text-align:center;color:rgba(230,230,230,0.75);margin-top:40px}
    @media (max-width:600px){ h1{font-size:22px} }
  </style>
</head>
<body>
  <header class="site">
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a class="brand" href="/">Novo Despertar</a>
      <a href="/index.html" data-nav="index">Início</a>
      <a href="/artigos.html" data-nav="artigos">Artigos</a>
      <a href="/temas.html" data-nav="temas">Temas</a>
      <a href="/sobre.html" data-nav="sobre">Sobre</a>
      <a id="createLink" href="/admin.html" style="display:none;margin-left:8px">Criar artigo</a>
      <a href="/admin.html" data-nav="admin" style="margin-left:auto">Admin</a>
    </nav>
  </header>

  <main class="wrap" id="main" role="main">
    <div id="loading" class="center small" aria-live="polite">A carregar artigo…</div>

    <article id="article" style="display:none" aria-labelledby="title">
      <h1 id="title"></h1>
      <div class="meta" id="meta"></div>

      <div class="feature-wrap" id="featureWrap" style="display:none" aria-hidden="true">
        <img id="articleImage" class="feature" src="" alt="" loading="lazy" decoding="async" />
      </div>

      <div id="content" class="lead" tabindex="0"></div>
    </article>

    <div id="notfound" class="center error" style="display:none" role="status" aria-live="polite">Artigo não encontrado.</div>
  </main>

  <footer>© Novo Despertar — 2026</footer>

  <script>
    // Menu: ativa item correspondente e mostra "Criar artigo" se autenticado
    (function menuInit(){
      const map = {
        '/': 'index','/index.html':'index','/artigos.html':'artigos',
        '/temas.html':'temas','/sobre.html':'sobre','/admin.html':'admin',
        '/artigo-exemplo.html':'artigos'
      };
      const navEls = document.querySelectorAll('nav .nav a[data-nav]');
      const path = location.pathname || '/';
      const key = map[path] || null;
      navEls.forEach(a => a.classList.toggle('active', a.getAttribute('data-nav') === key));

      const createLink = document.getElementById('createLink');
      try {
        const token = sessionStorage.getItem('nd_token');
        if (createLink) createLink.style.display = token ? 'inline-block' : 'none';

        // intercepta clique: define flag e navega para admin; se já estiver no admin tenta abrir modal sem reload
        if (createLink) {
          createLink.addEventListener('click', (e) => {
            e.preventDefault();
            try { sessionStorage.setItem('nd_open_new', '1'); } catch (err) { /* ignore */ }
            if (location.pathname.endsWith('/admin.html')) {
              try { if (typeof openModalForNew === 'function') { sessionStorage.removeItem('nd_open_new'); openModalForNew(); return; } } catch (err) {}
            }
            location.href = createLink.href || '/admin.html';
          });
        }
      } catch (e) {
        if (createLink) createLink.style.display = 'none';
      }
    })();

    // Helpers
    function getParam(name) {
      const url = new URL(location.href);
      return url.searchParams.get(name);
    }
    function setText(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text || '';
    }

    async function fetchArticleByIdOrSlug(idOrSlug) {
      const res = await fetch('/api/articles/' + encodeURIComponent(idOrSlug), { headers: { Accept: 'application/json' } });
      if (!res.ok) throw new Error('Not found');
      return res.json();
    }

    async function fetchFirstArticle() {
      const res = await fetch('/api/articles', { headers: { Accept: 'application/json' } });
      if (!res.ok) throw new Error('Failed');
      const j = await res.json();
      const list = j.results || [];
      return list[0] || null;
    }

    // Placeholder SVG (blur-up)
    const placeholderSVG = encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200"><rect width="100%" height="100%" fill="#0b0b0b"/><rect x="16" y="16" width="288" height="168" rx="8" fill="#1a1a1a"/></svg>');
    const placeholderData = 'data:image/svg+xml;charset=utf-8,' + placeholderSVG;

    (async function init() {
      const loading = document.getElementById('loading');
      const articleEl = document.getElementById('article');
      const notfound = document.getElementById('notfound');

      try {
        let slug = getParam('slug') || getParam('id');
        let article = null;

        if (slug) {
          try { article = await fetchArticleByIdOrSlug(slug); } catch (e) { article = null; }
        }

        if (!article) {
          article = await fetchFirstArticle();
        }

        if (!article) {
          loading.style.display = 'none';
          notfound.style.display = 'block';
          return;
        }

        // render
        loading.style.display = 'none';
        articleEl.style.display = 'block';
        setText('title', article.title);
        setText('meta', (new Date(article.date)).toLocaleDateString('pt-PT') + (article.category ? ' · ' + article.category : ''));

        // imagem responsiva com blur-up e srcset
        if (article.imageUrl || article.imageThumbUrl) {
          const img = document.getElementById('articleImage');
          const wrap = document.getElementById('featureWrap');

          const thumb = article.imageThumbUrl || article.imageUrl;
          const large = article.imageUrl || article.imageThumbUrl;

          img.src = placeholderData;
          img.setAttribute('data-src', thumb);
          img.srcset = `${thumb} 320w, ${large} 1200w`;
          img.sizes = '(max-width:600px) 320px, 1200px';
          img.alt = article.title || 'Imagem do artigo';
          wrap.style.display = 'block';
          wrap.setAttribute('aria-hidden','false');

          // load real image in background and remove blur when ready
          const real = img.getAttribute('data-src');
          const loader = new Image();
          loader.src = real;
          loader.onload = () => {
            img.src = real;
            img.classList.add('loaded');
            img.removeAttribute('data-src');
          };
          loader.onerror = () => {
            img.classList.add('loaded');
            img.removeAttribute('data-src');
          };
        }

        // Conteúdo: inserimos como texto por segurança (evita XSS)
        setText('content', article.content || article.excerpt || '');

        // move focus to content for keyboard users
        const content = document.getElementById('content');
        if (content) content.focus();

      } catch (err) {
        console.error(err);
        loading.style.display = 'none';
        notfound.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
