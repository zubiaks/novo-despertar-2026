<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artigo — Novo Despertar</title>
  <meta name="description" content="Leitura de artigo do Novo Despertar." />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <!-- Menu centralizado (partial carregado por /js/menu-loader.js) -->
  <div id="site-menu"></div>
  <script src="/js/menu-loader.js" defer></script>

  <main class="container" id="main" role="main">
    <article id="article" class="article" itemscope itemtype="http://schema.org/Article">
      <header class="article-header">
        <h1 id="article-title" itemprop="headline">A carregar…</h1>
        <p class="article-meta">
          <span id="article-date" itemprop="datePublished"></span>
          <span id="article-category"></span>
        </p>
      </header>

      <figure class="article-hero" id="article-hero" aria-hidden="true">
        <!-- imagem principal será inserida dinamicamente -->
      </figure>

      <div id="article-content" class="article-content" itemprop="articleBody">
        <p class="loading">A carregar conteúdo do artigo…</p>
      </div>

      <footer class="article-footer">
        <div class="article-actions">
          <button id="btn-share" type="button">Partilhar</button>
          <a id="btn-admin-edit" href="/admin.html" class="btn-link" hidden>Editar (Admin)</a>
        </div>
      </footer>
    </article>
  </main>

  <!-- Footer partial -->
  <div id="site-footer"></div>
  <script>
    (async ()=>{
      const el = document.getElementById('site-footer');
      if (!el) return;
      try {
        const r = await fetch('/partials/footer.html', { cache: 'no-cache' });
        if (r.ok) el.innerHTML = await r.text();
        else el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      } catch (e) {
        el.innerHTML = '<footer class="site-footer"><div class="container"><p>&copy; Novo Despertar — 2026</p></div></footer>';
      }
    })();
  </script>

  <!-- Script: carregar artigo pelo slug e gerir UI -->
  <script>
    (function(){
      const titleEl = document.getElementById('article-title');
      const dateEl = document.getElementById('article-date');
      const catEl = document.getElementById('article-category');
      const heroEl = document.getElementById('article-hero');
      const contentEl = document.getElementById('article-content');
      const editLink = document.getElementById('btn-admin-edit');

      function getSlug() {
        const params = new URLSearchParams(location.search);
        return params.get('slug') || '';
      }

      async function fetchArticleBySlug(slug) {
        if (!slug) return null;
        try {
          const res = await fetch('/api/articles?slug=' + encodeURIComponent(slug), { cache: 'no-cache' });
          if (!res.ok) return null;
          const json = await res.json();
          // API may return { items: [...] } or single object; normalize
          if (Array.isArray(json.items)) return json.items[0] || null;
          return json || null;
        } catch (err) {
          return null;
        }
      }

      function renderHero(imageUrl, imageAlt) {
        heroEl.innerHTML = '';
        if (!imageUrl) return;
        const img = document.createElement('img');
        img.src = imageUrl;
        img.alt = imageAlt || '';
        img.loading = 'lazy';
        img.width = 1200;
        img.height = 675;
        heroEl.appendChild(img);
        heroEl.removeAttribute('aria-hidden');
      }

      function renderContent(html) {
        contentEl.innerHTML = html || '<p>Conteúdo indisponível.</p>';
      }

      function formatDate(d) {
        try {
          return new Date(d).toLocaleDateString('pt-PT', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch { return d; }
      }

      async function init() {
        const slug = getSlug();
        if (!slug) {
          titleEl.textContent = 'Artigo não especificado';
          contentEl.innerHTML = '<p>O artigo não foi encontrado. Verifica o link.</p>';
          return;
        }

        titleEl.textContent = 'A carregar…';
        const a = await fetchArticleBySlug(slug);
        if (!a) {
          titleEl.textContent = 'Artigo não encontrado';
          contentEl.innerHTML = '<p>Não foi possível carregar o artigo.</p>';
          return;
        }

        titleEl.textContent = a.title || 'Sem título';
        if (a.date) dateEl.textContent = formatDate(a.date);
        catEl.textContent = a.category ? ' • ' + a.category : '';
        renderHero(a.imageUrl || a.imageThumbUrl, a.imageAlt || '');
        renderContent(a.content || a.body || '');

        // mostrar link de edição se token presente
        try {
          const token = sessionStorage.getItem('nd_token');
          if (token) {
            editLink.hidden = false;
            // opcional: apontar para edição com slug/id
            editLink.href = '/admin.html';
          }
        } catch (e) {}
      }

      // partilha simples: copia URL para clipboard
      document.getElementById('btn-share').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          alert('Link copiado para a área de transferência.');
        } catch (e) {
          alert('Não foi possível copiar o link.');
        }
      });

      init();
    })();
  </script>
</body>
</html>
