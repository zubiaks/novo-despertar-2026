<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Temas — Novo Despertar</title>
  <meta name="description" content="Explora os temas do Novo Despertar: espiritualidade, práticas, saúde mental e história." />
  <link rel="stylesheet" href="/css/main.css?v=1" />
  <link rel="icon" href="/favicon.ico" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="color-scheme" content="light dark" />
</head>
<body>
  <a class="skip-link" href="#main">Saltar para o conteúdo</a>

  <div id="site-menu"></div>
  <script src="/js/menu-loader.js" defer></script>
  <script src="/js/init-menu.js" defer></script>

  <script src="/js/toasts.js" defer></script>

  <main class="container" id="main" role="main" tabindex="-1">
    <header class="page-header" style="margin-bottom:1rem">
      <h1>Temas</h1>
      <p class="lead">Navega por temas e encontra artigos, guias e recursos agrupados por assunto.</p>
    </header>

    <section aria-labelledby="controls-heading" style="margin-bottom:1rem">
      <h2 id="controls-heading" class="visually-hidden">Controles de pesquisa e filtro</h2>
      <div class="controls" role="region" aria-label="Pesquisa e filtros">
        <form id="search-form" class="search-form" role="search">
          <label for="q" class="visually-hidden">Pesquisar temas</label>
          <input id="q" name="q" type="search" placeholder="Pesquisar temas..." aria-label="Pesquisar temas" />
          <button id="search-btn" class="btn" type="submit">Pesquisar</button>
          <button id="clear-btn" class="btn btn-outline" type="button">Limpar</button>
        </form>

        <div id="results-count" aria-live="polite" class="results-count" style="margin-left:auto;color:#475569;font-size:0.95rem"></div>
      </div>
    </section>

    <section id="themes-section" aria-labelledby="themes-heading">
      <h2 id="themes-heading" class="visually-hidden">Lista de temas</h2>
      <div id="themes-grid" class="themes-grid" aria-live="polite">
        <div class="placeholder" role="status" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    // Safe, DOM-based renderer for themes (no innerHTML with server content)
    (function () {
      const themesGrid = document.getElementById('themes-grid');
      const searchForm = document.getElementById('search-form');
      const qInput = document.getElementById('q');
      const clearBtn = document.getElementById('clear-btn');
      const resultsCount = document.getElementById('results-count');

      const toast = {
        info: (m) => window.toastInfo ? window.toastInfo(m) : console.info(m),
        error: (m) => window.toastError ? window.toastError(m) : console.error(m)
      };

      function safeTextNode(text) {
        return document.createTextNode(String(text || ''));
      }

      function createThemeCard(theme) {
        const aHref = theme.url || ('/artigos.html?tema=' + encodeURIComponent(theme.id || ''));
        const article = document.createElement('article');
        article.className = 'theme-card';

        const link = document.createElement('a');
        link.href = aHref;
        link.style.textDecoration = 'none';
        link.style.color = 'inherit';
        link.setAttribute('aria-label', theme.title || 'Tema');

        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.alignItems = 'center';
        row.style.gap = '0.75rem';

        const thumbWrap = document.createElement('div');
        thumbWrap.style.width = '64px';
        thumbWrap.style.height = '64px';
        thumbWrap.style.borderRadius = '8px';
        thumbWrap.style.overflow = 'hidden';
        thumbWrap.style.flex = '0 0 64px';

        const img = document.createElement('img');
        img.src = theme.image || '/images/placeholder-article.jpg';
        img.alt = theme.image ? (theme.title || '') : '';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.addEventListener('error', () => { img.src = '/images/placeholder-article.jpg'; });

        thumbWrap.appendChild(img);

        const meta = document.createElement('div');
        meta.style.flex = '1';

        const h3 = document.createElement('h3');
        h3.appendChild(safeTextNode(theme.title || '—'));

        const desc = document.createElement('div');
        desc.className = 'theme-desc';
        desc.appendChild(safeTextNode(theme.description || ''));

        meta.appendChild(h3);
        meta.appendChild(desc);

        row.appendChild(thumbWrap);
        row.appendChild(meta);
        link.appendChild(row);
        article.appendChild(link);

        return article;
      }

      async function loadThemes(q = '') {
        themesGrid.innerHTML = '';
        const loading = document.createElement('div');
        loading.style.gridColumn = '1/-1';
        loading.style.padding = '1rem';
        loading.textContent = 'A carregar temas…';
        themesGrid.appendChild(loading);

        try {
          const params = new URLSearchParams();
          if (q) params.set('q', q);
          const res = await fetch('/api/themes' + (params.toString() ? '?' + params.toString() : ''), { cache: 'no-cache' });
          if (!res.ok) {
            toast.error('Não foi possível carregar temas.');
            themesGrid.innerHTML = '';
            const err = document.createElement('div');
            err.style.gridColumn = '1/-1';
            err.style.padding = '1rem';
            err.textContent = 'Erro ao carregar temas.';
            themesGrid.appendChild(err);
            resultsCount.textContent = '';
            return;
          }
          const data = await res.json();
          const items = Array.isArray(data.items) ? data.items : (Array.isArray(data) ? data : []);
          renderThemes(items);
          resultsCount.textContent = `${items.length} tema${items.length===1?'':'s'}`;
        } catch (err) {
          console.error(err);
          toast.error('Erro de rede ao carregar temas.');
          themesGrid.innerHTML = '';
          const err = document.createElement('div');
          err.style.gridColumn = '1/-1';
          err.style.padding = '1rem';
          err.textContent = 'Erro de rede ao carregar temas.';
          themesGrid.appendChild(err);
          resultsCount.textContent = '';
        }
      }

      function renderThemes(items) {
        themesGrid.innerHTML = '';
        if (!items || items.length === 0) {
          const none = document.createElement('div');
          none.style.gridColumn = '1/-1';
          none.style.padding = '1rem';
          none.textContent = 'Nenhum tema encontrado.';
          themesGrid.appendChild(none);
          return;
        }
        items.forEach(t => themesGrid.appendChild(createThemeCard(t)));
      }

      // Events
      searchForm.addEventListener('submit', (ev) => {
        ev.preventDefault();
        loadThemes(qInput.value.trim());
      });
      clearBtn.addEventListener('click', () => {
        qInput.value = '';
        loadThemes('');
      });

      // Init: wait for menu if necessary
      function init() {
        const menuEl = document.getElementById('site-menu');
        if (!menuEl || menuEl.querySelector('nav')) {
          loadThemes('');
        } else {
          document.addEventListener('menu:loaded', () => loadThemes(''));
        }
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else setTimeout(init, 0);

      // Footer loader (robust, uses partial)
      (async function loadFooter(){
        const el = document.getElementById('site-footer');
        if (!el) return;
        try {
          const r = await fetch('/partials/footer.html', { cache: 'no-cache' });
          if (r.ok) {
            // parse and inject only the footer element to avoid scripts/styles injection
            const text = await r.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const footer = doc.querySelector('footer') || doc.body.firstElementChild;
            if (footer) el.appendChild(document.importNode(footer, true));
            else el.innerHTML = '<footer class="site-footer"><div class="container"><p>© Novo Despertar — ' + new Date().getFullYear() + '</p></div></footer>';
          } else {
            el.innerHTML = '<footer class="site-footer"><div class="container"><p>© Novo Despertar — ' + new Date().getFullYear() + '</p></div></footer>';
          }
        } catch (e) {
          el.innerHTML = '<footer class="site-footer"><div class="container"><p>© Novo Despertar — ' + new Date().getFullYear() + '</p></div></footer>';
        }
      })();
    })();
  </script>
</body>
</html>
